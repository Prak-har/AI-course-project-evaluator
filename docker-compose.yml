services:
  postgres:
    image: postgres:16
    container_name: ai-course-evaluator-postgres
    environment:
      POSTGRES_DB: ai_course_evaluator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
